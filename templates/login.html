<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Eco Transfo Contrats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-glow login-glow--1"></div>
    <div class="login-glow login-glow--2"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Header -->
      <div class="login-header">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Eco Transfo" class="login-logo">
        <h2 class="login-title">Gestion des Contrats</h2>
        <p class="login-sub">Accès réservé au personnel autorisé</p>
      </div>

      <!-- Flash errors -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="login-alert login-alert--{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <!-- Form -->
      <form class="login-form" method="POST" action="{{ url_for('login') }}">
        <div class="form-field">
          <label class="form-label">Adresse email</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M1 6l7 4.5L15 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <input type="email" name="email" class="form-input" placeholder="votre@ecotransfo.ma" required autocomplete="email">
          </div>
        </div>

        <div class="form-field">
          <label class="form-label">Mot de passe</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="7" width="12" height="8" rx="2" stroke="currentColor" stroke-width="1.3"/>
              <path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <circle cx="8" cy="11" r="1.2" fill="currentColor"/>
            </svg>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn-login-submit">
          Se connecter
        </button>
      </form>

      <div class="login-footer">
        <span class="access-badge">🔒 Accès limité</span>
      </div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.querySelectorAll('.login-alert').forEach(el => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      });
    }, 5000);
  </script>
</body>
</html>
